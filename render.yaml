databases:
  - name: begriff-db
    plan: free
    databaseName: begriffdb
    user: begriff

services:
  - type: web
    name: begriff-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        fromDatabase:
          name: begriff-db
          property: connectionString
      - key: DATABASE_SSL_MODE
        value: require
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENABLE_DEFAULT_ADMIN
        value: "true"
      - key: DEFAULT_ADMIN_EMAIL
        value: admin
      - key: DEFAULT_ADMIN_PASSWORD
        value: admin
      - key: CORS_ORIGINS
        value: https://begriffdifaria.netlify.app
      - key: GATEWAY_API_URL
        value: http://localhost:8081
      - key: OPEN_BANKING_MOCK_URL
        value: https://example.invalid
      - key: BLOCKCHAIN_NODE_URL
        value: https://example.invalid
      - key: GEMINI_API_KEY
        sync: false
