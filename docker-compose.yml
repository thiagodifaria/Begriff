services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    networks:
      - begriff_network

  api_server:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "src.app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./src/domains/risk/models:/app/domains/risk/models
      
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    depends_on:
      - db
      - gateway_server
      - open_banking_mock_server
      - blockchain_node
      - reconciliation_middleware
      - crypto_middleware
    networks:
      - begriff_network

  gateway_server:
    build:
      context: .
      dockerfile: ./src/infra/gateways/performance_gateway/Dockerfile
    ports:
      - "8081:8081"
    networks:
      - begriff_network

  reconciliation_middleware:
    build:
      # CORREÇÃO: O contexto foi alterado para a raiz do projeto ('.')
      # Isso permite que o Dockerfile acesse qualquer arquivo do projeto.
      context: .
      # CORREÇÃO: O caminho para o Dockerfile agora é o caminho completo a partir da nova raiz de contexto.
      dockerfile: src/domains/middleware/Dockerfile
      target: reconciliation_runtime
    ports:
      - "18080:18080"
    networks:
      - begriff_network

  crypto_middleware:
    build:
      # CORREÇÃO: O contexto foi alterado para a raiz do projeto ('.')
      context: .
      # CORREÇÃO: O caminho para o Dockerfile agora é o caminho completo a partir da nova raiz de contexto.
      dockerfile: src/domains/middleware/Dockerfile
      target: crypto_runtime
    ports:
      - "18081:18081"
    networks:
      - begriff_network

  open_banking_mock_server:
    build:
      context: ./src/infra/mocks/open_banking_provider
    ports:
      - "8080:8080"
    networks:
      - begriff_network

  blockchain_node:
    build:
      context: ./src/infra/blockchain/node
    working_dir: /app
    ports:
      - "8545:8545"
    networks:
      - begriff_network

networks:
  begriff_network:
    driver: bridge

volumes:
  postgres_data: